<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FrameFusion Studio</title>
    <link rel="icon" href="assets/images/framefusion-favicon.png?v=2" type="image/png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=50">
</head>

<body class="auth-body">
    <main class="auth-page">
        <section class="panel auth-card"><a class="logo brand-lockup auth-logo" href="index.html"><img class="brand-logo-img" src="assets/images/framefusion-logo.png?v=2" alt="FrameFusion Studio logo"><span><strong>FrameFusion</strong><small>Studio</small></span></a>
            <h1>Access Your Account</h1>
            <form data-validate>
                <div class="field"><label for="login-email">Email</label><input id="login-email" type="email"
                        data-required><span class="error">Enter a valid email.</span></div>
                <div class="field"><label for="login-password">Password</label>
                    <div class="password-wrap"><input id="login-password" type="password" data-required
                            data-min="6"><button class="show-password" data-password-toggle type="button" aria-label="Show password"></button>
                    </div><span class="error">Password must be at least 6 characters.</span>
                </div>
                <div class="auth-row"><label class="check"><input type="checkbox"> Remember me</label><a
                        href="forgot-password.html">Forgot password?</a></div><button class="btn btn-primary btn-block"
                    type="submit">Login</button>
                <p class="form-message">Login details validated.</p>
            </form>
            <div class="social-login"><button class="btn btn-secondary" type="button"><img class="auth-social-logo"
                        src="assets/icons/google-logo.svg" alt="Google"> Google</button><button
                    class="btn btn-secondary" type="button"><img class="auth-social-logo"
                        src="assets/icons/apple-logo.svg" alt="Apple"> Apple</button></div>
            <p class="muted">New here? <a href="signup.html">Create an account</a></p>
        </section>
    </main>
    <script src="js/main.js?v=50"></script>
</body>

</html>
