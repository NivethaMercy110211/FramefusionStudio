<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | FrameFusion Studio</title>
    <link rel="icon" href="assets/images/framefusion-favicon.png?v=2" type="image/png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=56">
</head>

<body class="auth-body">
    <main class="auth-page">
        <!-- Background Video -->
        <div class="hero-bg-video-wrapper">
            <video autoplay loop muted playsinline preload="auto" poster="assets/images/showreel-transition-bg-new.jpg" class="hero-bg-video">
                <source src="assets/videos/Thumbnail & Cover Frames.mp4" type="video/mp4">
            </video>
            <div class="hero-bg-video-overlay"></div>
        </div>

        <section class="panel auth-card"><a class="logo brand-lockup auth-logo" href="index.html"><img class="brand-logo-img" src="assets/images/framefusion-logo.png?v=2" alt="FrameFusion Studio logo"><span><strong>FrameFusion</strong><small>Studio</small></span></a>
            <h1>Recover Your Account</h1>
            <form data-validate>
                <div class="field"><label for="reset-email">Email</label><input id="reset-email" type="email" placeholder="you@example.com"
                        data-required><span class="error">Enter a valid email.</span></div><button
                    class="btn btn-primary btn-block" type="submit">Send Reset Link</button>
                <p class="form-message">Reset email validated.</p>
            </form>
            <p class="muted">Remember your password?<br><a href="login.html">Back to Login</a></p>
        </section>
    </main>
    <script src="js/main.js?v=50"></script>
</body>

</html>
